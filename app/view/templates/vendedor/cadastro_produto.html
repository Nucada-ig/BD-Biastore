{% extends "base.html" %}
{% block titulo %}{{ "Editar produto" if produto else "Novo produto" }}{% endblock %}
{% block conteudo %}
<div class="cabecalho-pagina">
    <span class="eyebrow">Painel do vendedor</span>
    <h1>{{ "Editar produto" if produto else "Cadastrar produto" }}</h1>
</div>

<form class="formulario formulario--largo" method="post">
    <div class="campo">
        <label for="nome">Nome do produto</label>
        <input type="text" id="nome" name="nome" value="{{ produto.nome if produto else '' }}" placeholder="Ex: Camiseta básica" required>
    </div>
    <div class="campo">
        <label for="preco">Preço (R$)</label>
        <input type="number" step="0.01" min="0" id="preco" name="preco" value="{{ produto.preco if produto else '' }}" placeholder="0.00" required>
    </div>
    <div class="campo">
        <label for="imagem">URL da imagem</label>
        <input type="text" id="imagem" name="imagem" value="{{ produto.imagem if produto else '' }}" placeholder="https://exemplo.com/imagem.jpg">
    </div>
    <div class="campo">
        <label for="descricao">Descrição</label>
        <textarea id="descricao" name="descricao" rows="4" placeholder="Detalhes sobre o produto">{{ produto.descricao if produto else '' }}</textarea>
    </div>
    <button type="submit" class="botao botao--primario">{{ "Salvar alterações" if produto else "Cadastrar produto" }}</button>
</form>

<p style="margin-top: 1.4rem;">
    <a href="{{ url_for('vendedor.home') }}">&larr; Voltar aos meus produtos</a>
</p>
{% endblock %}
