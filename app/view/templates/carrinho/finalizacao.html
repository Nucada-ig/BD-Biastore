{% extends "base.html" %}
{% block titulo %}Pedido confirmado{% endblock %}
{% block conteudo %}
<div class="cartao-confirmacao">
    <div class="cartao-confirmacao__selo">&check;</div>
    <h1>Pedido realizado</h1>
    <p>Seu pedido #{{ pedido.id }} foi confirmado e já está em processamento.</p>
    <p class="produto-detalhe__preco" style="font-size:1.5rem;">R$ {{ "%.2f"|format(pedido.valor_total) }}</p>
    <div style="display:flex; gap:0.8rem; justify-content:center; margin-top:1rem;">
        <a href="{{ url_for('usuario.pedidos') }}" class="botao botao--secundario">Ver meus pedidos</a>
        <a href="{{ url_for('usuario.home') }}" class="botao botao--primario">Continuar comprando</a>
    </div>
</div>
{% endblock %}
