{% extends "base.html" %}
{% block titulo %}Entrar{% endblock %}
{% block conteudo %}
<div class="tela-auth">
    <span class="eyebrow">Bem-vindo de volta</span>
    <h1>Entrar na BIA-Store</h1>
    <p>Acesse sua conta para continuar comprando ou gerenciar sua loja.</p>

    {% if erro %}<div class="mensagem-erro">{{ erro }}</div>{% endif %}

    <form class="formulario" method="post">
        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="voce@email.com" required>
        </div>
        <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="••••••••" required>
        </div>
        <button type="submit" class="botao botao--primario botao--bloco">Entrar</button>
    </form>

    <p class="tela-auth__rodape">
        Ainda não tem conta? <a href="{{ url_for('auth.cadastro') }}" style="color: var(--cor-destaque); font-weight:600;">Criar conta</a>
    </p>
</div>
{% endblock %}
